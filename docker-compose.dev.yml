services:
  postgres:
    image: postgres:16-alpine
    container_name: loglens-postgres
    environment:
      POSTGRES_USER: loglens
      POSTGRES_PASSWORD: loglens
      POSTGRES_DB: loglens
    ports:
      - "5432:5432"
    volumes:
      - loglens-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loglens"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Phase 2: uncomment when kafka source is implemented
